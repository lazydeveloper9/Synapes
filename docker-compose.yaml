services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Prisma connection string
      DATABASE_URL: postgresql://synapes_user:synapes_pass@postgres:5432/synapes?schema=public
      JWT_SECRET: your_super_secret_key
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: synapes-postgres
    environment:
      POSTGRES_USER: synapes_user
      POSTGRES_PASSWORD: synapes_pass
      POSTGRES_DB: synapes
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapes_user -d synapes"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pg_data: