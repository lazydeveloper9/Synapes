services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.yaml
    environment:
      MONGO_URI: mongodb://mongo:27017/synapes
      DATABASE_URL: postgresql://synapes:synapes@postgres:5432/synapes
      POSTGRES_HOST: postgres
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile.yaml
    ports:
      - "3000:80"
    depends_on:
      - backend
      - yjs-server

  yjs-server:
    build:
      context: ./yjs-server
      dockerfile: Dockerfile
    ports:
      - "1234:1234"
    environment:
      PORT: 1234
    restart: always

  mongo:
    image: mongo:7
    container_name: synapes-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: synapes-postgres
    environment:
      POSTGRES_USER: synapes
      POSTGRES_PASSWORD: synapes
      POSTGRES_DB: synapes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U synapes -d synapes" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
  postgres_data:
