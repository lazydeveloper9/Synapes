version: '3.8'

services:
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    restart: always

  postgres:
    image: "postgres:15-alpine"
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: documents
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d documents"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    ports:
      - "1234:1234"
    environment:
      - REDIS_HOST=redis
      - DB_HOST=postgres
      - DB_USER=synapse
      - DB_PASSWORD=synapse
      - DB_NAME=documents
    depends_on:
      - redis
      - postgres
    restart: always

  ai-service:
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    environment:
      # host.docker.internal dynamically resolves to the Windows host IP
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
    restart: always

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
      - "5174:5174"
    environment:
      - VITE_WS_URL=ws://localhost:1234
    depends_on:
      - backend
      - api-backend
    restart: always

  api-backend:
    build:
      context: ./api-backend
      dockerfile: Dockerfile.yaml
    environment:
      DB_HOST: postgres
      DB_USER: synapse
      DB_PASSWORD: synapse
      DB_NAME: documents
      PORT: 5000
      JWT_SECRET: synapse_jwt_secret_key_2024
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
